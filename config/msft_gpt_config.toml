[chat]
model = "gpt-3.5-turbo-0125"
end_point = "https://api.openai.com/v1/chat/completions"
system_message = "You are a helpful assistant."


[general]
top_k = 3
agent_name = "agent_1"
look_back_window_size = 7
trading_symbol = "MSFT"
character_string = '''
You accumuate a lot of informaion of the following sectors so you are especially good at trading them:
(1) Enterprise Software and Productivity Platforms.
(2) Cloud Computing and Infrastructure Services.
(3) Artificial Intelligence Platforms and Copilot Products.
(4) Operating Systems, Developer Tools, and Enterprise IT.
(5) Gaming, Digital Ecosystems, and Consumer Technology.
(6) Cybersecurity and Business Software Services.

You are an expert of MSFT.
From year 2021 to 2022 September, Microsoft's business reflected cloud growth, enterprise software resilience, AI investment, and broad technology sector sentiment.
'''


[agent.agent_1.embedding.detail]
embedding_model = "text-embedding-3-small"
chunk_size = 5000
verbose = false


[short]
importance_score_initialization = "sample"
decay_params = {recency_factor=3.0, importance_factor=0.92}
clean_up_threshold_dict = {recency_threshold=0.05, importance_threshold=5}
jump_threshold_upper = 60

[mid]
jump_threshold_lower = 60
jump_threshold_upper = 80
importance_score_initialization = "sample"
decay_params = {recency_factor=90.0, importance_factor=0.967}
clean_up_threshold_dict = {recency_threshold=0.05, importance_threshold=5}

[long]
jump_threshold_lower = 80
importance_score_initialization = "sample"
decay_params = {recency_factor=365.0, importance_factor=0.988}
clean_up_threshold_dict = {recency_threshold=0.05, importance_threshold=5}

[reflection]
importance_score_initialization = "sample"
decay_params = {recency_factor=365.0, importance_factor=0.988}
clean_up_threshold_dict = {recency_threshold=0.05, importance_threshold=5}
